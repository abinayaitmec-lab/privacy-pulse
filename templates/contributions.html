<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community Contributions — PrivacyPulse</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #080b14;
    color: #e4e4e7;
    min-height: 100vh;
    padding: 40px 40px;
}
.wrapper { width: 100%; max-width: 1100px; margin: 0 auto; }

/* Navbar */
.navbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 0; margin-bottom: 40px; border-bottom: 1px solid #1a1c28;
}
.nav-left { display: flex; align-items: center; gap: 10px; }
.nav-brand {
    display: flex; align-items: center; gap: 8px; text-decoration: none;
}
.nav-brand-icon {
    width: 30px; height: 30px;
    background: linear-gradient(135deg, #22c55e, #16a34a);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
}
.nav-brand-text { font-size: 17px; font-weight: 800; color: #e4e4e7; letter-spacing: -0.5px; }
.nav-right { display: flex; gap: 4px; }
.nav-link {
    padding: 8px 16px; border-radius: 8px; text-decoration: none;
    font-size: 13px; font-weight: 600; color: #63637a; transition: all .2s;
}
.nav-link:hover { color: #e4e4e7; background: rgba(255,255,255,0.04); }
.nav-link.active { color: #22c55e; background: rgba(34,197,94,0.08); }

h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
.subtitle { color: #71717a; font-size: 14px; margin-bottom: 28px; }

/* Filters */
.filters { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
.filter-btn {
    padding: 7px 18px; border-radius: 20px; border: 1px solid #27272a;
    background: transparent; color: #71717a; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all .2s;
}
.filter-btn:hover { border-color: #22c55e; color: #22c55e; }
.filter-btn.active { background: rgba(34,197,94,0.12); border-color: #22c55e; color: #22c55e; }

/* Table */
table { width: 100%; border-collapse: collapse; font-size: 14px; }
th {
    text-align: left; padding: 14px 12px; color: #63637a;
    font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
    border-bottom: 1px solid #1a1c28; background: #0a0d16;
    position: sticky; top: 0;
}
td { padding: 16px 12px; border-bottom: 1px solid #171a26; }
tr:hover td { background: rgba(34,197,94,0.02); }
td.domain { font-weight: 700; color: #e4e4e7; }
td.contributor { color: #22c55e; }
td.date { color: #63637a; font-size: 13px; }

.status-badge {
    display: inline-block; font-size: 12px; font-weight: 700;
    padding: 4px 12px; border-radius: 20px;
}
.status-badge.pending { background: rgba(234,179,8,0.12); color: #eab308; }
.status-badge.approved { background: rgba(34,197,94,0.12); color: #22c55e; }
.status-badge.rejected { background: rgba(239,68,68,0.12); color: #ef4444; }

.empty-state { text-align: center; padding: 80px 20px; color: #52525b; }
.empty-state .big { font-size: 48px; margin-bottom: 16px; }
.empty-state p { font-size: 15px; line-height: 1.6; }

.loading { text-align: center; padding: 80px 20px; color: #71717a; font-size: 14px; }
.loading-bar { width: 200px; height: 3px; background: #1a1c28; border-radius: 2px; overflow: hidden; margin: 12px auto; }
.loading-bar-fill { height: 100%; width: 30%; background: linear-gradient(90deg, #22c55e, #4ade80); border-radius: 2px; animation: loadingSlide 1.2s ease-in-out infinite; }
@keyframes loadingSlide {
    0% { transform: translateX(-100%); width: 30%; }
    50% { width: 60%; }
    100% { transform: translateX(400%); width: 30%; }
}

.footer { text-align: center; margin-top: 40px; font-size: 12px; color: #3f3f50; }

@media (max-width: 768px) {
    body { padding: 20px 16px; }
    h1 { font-size: 20px; }
    .subtitle { font-size: 13px; }
    .navbar { flex-wrap: wrap; gap: 8px; }
    td, th { padding: 12px 8px; font-size: 13px; }
    .filter-btn { padding: 6px 14px; font-size: 12px; }
}

@media (max-width: 540px) {
    td, th { padding: 10px 6px; font-size: 12px; }
    .status-badge { font-size: 11px; padding: 3px 8px; }
    td.date { font-size: 11px; }
}
</style>
</head>
<body>
<div class="wrapper">
    <nav class="navbar">
        <a href="/" class="nav-brand">
            <div class="nav-brand-icon">🛡️</div>
            <span class="nav-brand-text">PrivacyPulse</span>
        </a>
        <div class="nav-right">
            <a href="/" class="nav-link">Home</a>
            <a href="/contributions" class="nav-link active">Contributions</a>
        </div>
    </nav>

    <h1>Community Contributions</h1>
    <p class="subtitle">See what sites the community has helped us analyze</p>

    <div class="filters" id="filters">
        <button class="filter-btn active" data-filter="all" onclick="filterContributions('all')">All</button>
        <button class="filter-btn" data-filter="pending" onclick="filterContributions('pending')">Pending</button>
        <button class="filter-btn" data-filter="approved" onclick="filterContributions('approved')">Approved</button>
        <button class="filter-btn" data-filter="rejected" onclick="filterContributions('rejected')">Rejected</button>
    </div>

    <div class="loading" id="loading">
        <div class="loading-bar"><div class="loading-bar-fill"></div></div>
        <span>Loading contributions...</span>
    </div>

    <div style="overflow-x:auto">
        <table id="contribTable" style="display:none">
            <thead>
                <tr>
                    <th>Domain</th>
                    <th>Contributor</th>
                    <th>Date</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="contribBody"></tbody>
        </table>
    </div>

    <div class="empty-state" id="emptyState" style="display:none">
        <div class="big">📋</div>
        <p>No contributions yet.<br>Be the first to help the community!</p>
    </div>

    <div class="footer">PrivacyPulse — Free privacy checker</div>
</div>

<script>
const API = "https://privacy-pulse-w415.onrender.com/api/contributions";

async function loadContributions() {
    try {
        const res = await fetch(API);
        const data = await res.json();
        const items = data.contributions || [];
        document.getElementById("loading").style.display = "none";

        if (items.length === 0) {
            document.getElementById("emptyState").style.display = "block";
            return;
        }

        const tbody = document.getElementById("contribBody");
        const table = document.getElementById("contribTable");
        table.style.display = "";
        window._allItems = items;
        renderRows(items);
    } catch (e) {
        document.getElementById("loading").innerHTML = '<span>Failed to load contributions.</span>';
    }
}

function renderRows(items) {
    const tbody = document.getElementById("contribBody");
    tbody.innerHTML = items.map(item => {
        const status = (item.status || "pending").toLowerCase();
        const statusLabels = { pending: "🟡 Pending Review", approved: "✅ Approved", rejected: "❌ Rejected" };
        const label = statusLabels[status] || "🟡 " + status;
        const date = item.submitted_at ? new Date(item.submitted_at).toLocaleDateString("en-US", { year: "numeric", month: "short", day: "numeric" }) : "—";
        const name = item.contributor_name || "Anonymous";
        return `<tr>
            <td class="domain">${item.domain}</td>
            <td class="contributor">${name}</td>
            <td class="date">${date}</td>
            <td><span class="status-badge ${status}">${label}</span></td>
        </tr>`;
    }).join("");
}

function filterContributions(filter) {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.toggle("active", b.dataset.filter === filter));
    const items = window._allItems || [];
    renderRows(filter === "all" ? items : items.filter(i => (i.status || "pending").toLowerCase() === filter));
}

loadContributions();
</script>
</body>
</html>
